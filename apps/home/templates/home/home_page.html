{% extends "base.html" %}

{% block title %}{{ page.title }}{% endblock %}

{% block content %}
<div class="hero">
  <h1>{{ page.title }}</h1>
</div>

{% if page.body %}
<div class="rich-text">
  {{ page.body|safe }}
</div>
{% endif %}

<div class="quick-links">
  <a href="/admin/">Wagtail Admin</a>
  <a href="/health/">Health Check</a>
  <a href="https://docs.wagtail.org/en/stable/" class="outline" target="_blank" rel="noopener">Wagtail Docs</a>
  <a href="https://docs.railway.com/" class="outline" target="_blank" rel="noopener">Railway Docs</a>
</div>
{% endblock %}
